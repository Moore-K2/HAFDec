# Lite-Mono Configuration
# options.yaml

# 使用monoVit模型
#ablation_model: "monoVit"
depth_encoder: "LiteMono"
#depth_decoder: "DepthDecoder"
depth_decoder: "BiDepthDecoder"
model_size: re_mono # re-mono, re_mono_8m,re_mono_tiny,re_mono_small
teacher_model: hl_mono # hl-mono, hl-mono-small, hl-mono-tiny, hl-mono-8m
warmup_steps: 3
val_of_epochs: 15
resume: false
use_kd: null # choose:[structure_kd, kd]c


# PATHS
data_path: "./kitti_data"
log_dir: "./tmp"

# TRAINING options
model_name: "lite-mono"
split: "eigen_test" # choices: [eigen_zhou, eigen_full, odom, benchmark, eigen_test, eigen_zhou_val]
cfg: "networks/models/lite_mono.yaml"
cfg_first: false
gpu_id: 0
model: "lite-mono" # choices: [lite-mono, lite-mono-small, lite-mono-tiny, lite-mono-8m]
weight_decay: 1.0e-2  # weight decay in AdamW
drop_path: 0.2  # drop path rate
num_layers: 18 # choices: [18, 34, 50, 101, 152]
dataset: "kitti" # choices: [kitti, kitti_odom, kitti_depth, kitti_test]
png: false # if true, trains from raw KITTI png files
height: 192
width: 640
disparity_smoothness: 1.0e-3  # disparity smoothness weight
scales: [0, 1, 2]  # scales used in the loss"
min_depth: 0.1
max_depth: 100.0
use_stereo: false
frame_ids: [0, -1, 1]
profile: true # if true, profiles the model once at the beginning of the training

# OPTIMIZATION options
batch_size: 1
lr: [0.0001, 5.0e-6, 31, 0.0001, 1.0e-5, 31] # [lr_depth:max_lr, min_lr, step, lr_pose:max_lr, min_lr, step]
# [lr1, min_lr1, epoch1, lr2, min_lr2, epoch2]
num_epochs: 4
scheduler_step_size: 15

# ABLATION options
v1_multiscale: false # if true, uses v1 multiscale loss
avg_reprojection: false
disable_automasking: false
predictive_mask: false
no_ssim: false
mypretrain: null # path to pretrained encoder if any
weights_init: "pretrained" # choices: [pretrained, scratch]
pose_model_input: "pairs" # choices: [pairs, all]
pose_model_type: "separate_resnet" # choices: [posecnn, separate_resnet, shared]

# SYSTEM options
no_cuda: false
num_workers: 4

# LOADING options
load_weights_folder: null
models_to_load: ["encoder", "depth", "pose_encoder", "pose"]

# LOGGING options
log_frequency: 250
save_frequency: 1

# EVALUATION options
disable_median_scaling: false
pred_depth_scale_factor: 1.0
ext_disp_to_eval: null
eval_split: "eigen"
save_pred_disps: false
no_eval: false
eval_out_dir: null
post_process: false